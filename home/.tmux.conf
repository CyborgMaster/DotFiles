# .tmux.conf
# See https://fburl.com/tmux for more info.
set -g default-command "${SHELL}"
set -g history-limit 500000
set -g status-right "#{s/.facebook.com//:host} • %Y-%m-%d %H:%M"
set -s default-terminal "tmux-256color"
set -s escape-time 0
set -g allow-passthrough all
set -g mouse on

unbind-key C-b              # free the original bind-key key
set-option -g prefix C-a    # setting the prefix from C-b to C-a
bind-key C-a send-prefix    # ensure that we can send Ctrl-A to other apps or the shell that your interacting

bind-key C-r source-file ~/.tmux.conf \; display "Config Reloaded !"

set-option -g base-index 1                # window index will start with 1
set-window-option -g pane-base-index 1    # pane index will start with 1
set-option -g renumber-windows on

set-option -g display-time 2000            # By default, status msg disappears in the blink of an eye (750ms)
set-option -g display-panes-time 2000      # By default, pane number disappears in 1 s
#set-option -wg automatic-rename off        # default names are too vague to see. Let me name it.

# Customize the appearance of the active window in the status bar
set-window-option -g window-status-current-style bg=blue,fg=brightwhite

# Optional: Remove the asterisk and other symbols entirely
set-window-option -g window-status-current-format " #I:#W "

# Open new terminals with the same working directory
bind-key c new-window -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}" 
bind-key _ split-window -v -c "#{pane_current_path}"

bind-key Up select-pane -U
bind-key Down select-pane -D
bind-key Left select-pane -L
bind-key Right select-pane -R

# Hotkeys to move between and swap windows
bind-key -n S-Left select-window -t -1
bind-key -n S-Right select-window -t +1
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1
# Bindings to send the original keystrokes to the underlying application if needed (using the prefix key)
bind-key S-Left send-keys S-Left
bind-key S-Right send-keys S-Right
bind-key C-S-Left send-keys C-S-Left
bind-key C-S-Right send-keys C-S-Right

# Temporarily disable all key bindings to send bound keys to the underlying application.
bind-key F12 \
    set prefix None \;\
    set key-table off \;\
    set status-style "fg=black,bg=red" \;\
    set status-left "[OFF] " \;\
    refresh-client -S
# Re-enable bindings: press F12 (no prefix)
bind-key -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    set -u status-left \;\
    refresh-client -S

# Set the foreground/background color for the active window
#setw -g window-active-style fg=colour15,bg=colour235
# Set the foreground/background color for all other windows
#setw -g window-style fg=colour245,bg=colour236

# List of plugins
#set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'jaclu/tmux-menus'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
#run '~/.tmux/plugins/tpm/tpm'
